<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Buzzer Kelompok - Family 100</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Rajdhani:wght@700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      touch-action: manipulation;
      /* Disable double-tap zoom for faster tap response */
    }

    .font-cyber {
      font-family: 'Rajdhani', sans-serif;
    }

    .neon-btn-glow {
      box-shadow: 0 0 30px rgba(250, 204, 21, 0.4);
    }

    .neon-btn-active:active {
      transform: scale(0.95);
      box-shadow: 0 0 50px rgba(250, 204, 21, 0.8);
    }

    /* Disable long press context menu on buzzer button */
    .no-select {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <!-- TOP STATUS (Always visible once connected) -->
  <div id="connectionStatus"
    class="fixed top-4 right-4 flex items-center gap-2 text-xs bg-slate-900/80 px-3 py-1 rounded-full border border-slate-800">
    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
    <span id="statusText" class="text-slate-400">Disconnected</span>
  </div>

  <!-- PHASE 1: LOGIN PIN & KELOMPOK -->
  <main id="loginPanel"
    class="w-full max-w-sm bg-slate-900/80 border border-slate-800 p-6 rounded-2xl shadow-xl shadow-black/40">
    <div class="text-center mb-6">
      <span class="text-4xl">🚨</span>
      <h1 class="text-2xl font-black font-cyber text-yellow-400 tracking-wider mt-2 uppercase">Buzzer Kelompok</h1>
      <p class="text-xs text-slate-400">Family 100 Dies Natalis TRPL</p>
    </div>

    <form onsubmit="submitLogin(event)" class="space-y-4">
      <div>
        <label for="groupSelect" class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Pilih
          Kelompok Anda</label>
        <select id="groupSelect" required
          class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm text-yellow-400 font-bold focus:ring-yellow-500 focus:border-yellow-500">
          <option value="" disabled selected>-- Pilih Kelompok --</option>
          <option value="1">KELOMPOK 1</option>
          <option value="2">KELOMPOK 2</option>
          <option value="3">KELOMPOK 3</option>
          <option value="4">KELOMPOK 4</option>
          <option value="5">KELOMPOK 5</option>
        </select>
      </div>

      <div>
        <label for="pinInput" class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">PIN
          Ruangan (PIN dari Operator)</label>
        <input type="text" id="pinInput" required inputmode="numeric" placeholder="Masukkan PIN..."
          class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-center text-lg text-white font-bold tracking-widest focus:outline-none focus:border-yellow-500">
      </div>

      <div id="errorMessage" class="text-xs text-rose-400 font-semibold text-center hidden"></div>

      <button type="submit"
        class="w-full py-3 bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black text-sm rounded-lg uppercase tracking-widest transition-all active:scale-98 shadow-lg shadow-yellow-500/10">
        Hubungkan
      </button>
    </form>
  </main>

  <!-- PHASE 2: BUZZER BUTTON SCREEN -->
  <main id="buzzerPanel" class="hidden w-full max-w-md flex flex-col items-center justify-center gap-4 text-center">

    <div>
      <span id="groupBadge"
        class="px-4 py-1.5 bg-yellow-500/10 border border-yellow-500/30 text-yellow-400 text-sm font-extrabold uppercase rounded-full tracking-widest">
        Kelompok X
      </span>
      <h2 id="buzzerStatusText" class="text-lg text-slate-300 mt-3 tracking-wide font-medium">
        Siaga, Siap Menekan Buzzer!
      </h2>
    </div>

    <!-- THE BUZZER BUTTON -->
    <div class="relative flex items-center justify-center py-2 w-full">
      <!-- Outer Pulsing Glow -->
      <div id="outerPulse"
        class="absolute w-56 h-56 rounded-full bg-yellow-500/5 border border-yellow-500/10 animate-ping hidden"></div>

      <!-- Main Interactive Button -->
      <button id="btnBuzz" ontouchstart="handleBuzzStart(event)" onmousedown="handleBuzzStart(event)"
        class="no-select w-52 h-52 rounded-full bg-gradient-to-b from-yellow-400 to-amber-500 border-8 border-yellow-300 text-slate-950 font-black text-4xl tracking-widest uppercase flex items-center justify-center shadow-2xl transition-all duration-150 active:scale-90 select-none cursor-pointer focus:outline-none neon-btn-glow">
        BUZZ!
      </button>
    </div>

    <!-- MY SCORE DISPLAY -->
    <div class="w-full bg-slate-900/70 border border-slate-800 rounded-2xl p-4">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">⭐ Poin Kelompok Anda</p>
      <div class="flex items-center justify-center gap-3 py-2">
        <span id="myGroupLabel" class="text-sm font-bold text-yellow-400 uppercase tracking-wider">Kelompok X</span>
        <span id="myGroupScore" class="text-5xl font-black font-cyber text-yellow-300 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">0</span>
        <span class="text-sm text-slate-500 font-semibold">Poin</span>
      </div>
    </div>

    <!-- LOGOUT / DISCONNECT -->
    <button onclick="disconnectBuzzer()"
      class="text-xs text-slate-500 hover:text-slate-400 underline transition-colors uppercase font-bold tracking-widest">
      Ganti Kelompok / Logout
    </button>
  </main>

  <!-- SOUND UTILITY -->
  <script>
    let socket = null;
    let myGroup = null;
    let isBuzzerLocked = false;
    let audioCtx = null;
    let currentPin = '';

    // Connect socket on page load
    window.addEventListener('load', () => {
      // Connect to same origin
      socket = io();

      socket.on('connect', () => {
        document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse';
        document.getElementById('statusText').innerText = 'Connected';
        document.getElementById('statusText').className = 'text-emerald-400';

        // Auto-reconnect if saved credentials exist
        const savedGroup = localStorage.getItem('family100_buzzer_group');
        const savedPin = localStorage.getItem('family100_buzzer_pin');
        if (savedGroup && savedPin) {
          currentPin = savedPin;
          socket.emit('verify_pin', { groupIndex: savedGroup, pin: savedPin });
        }
      });

      socket.on('disconnect', () => {
        document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500';
        document.getElementById('statusText').innerText = 'Disconnected';
        document.getElementById('statusText').className = 'text-slate-400';
        resetToLogin();
      });

      // Verification Result
      socket.on('pin_verified', (res) => {
        const errorEl = document.getElementById('errorMessage');
        if (res.success) {
          errorEl.classList.add('hidden');
          myGroup = res.groupIndex;

          // Save credentials to localStorage
          localStorage.setItem('family100_buzzer_group', res.groupIndex);
          localStorage.setItem('family100_buzzer_pin', currentPin);

          showBuzzerScreen();
        } else {
          errorEl.innerText = res.message;
          errorEl.classList.remove('hidden');
          // Clear credentials on verification fail
          localStorage.removeItem('family100_buzzer_group');
          localStorage.removeItem('family100_buzzer_pin');
        }
      });

      // Sync game state to reflect locked states
      socket.on('sync_state', (state) => {
        if (!myGroup) return; // not logged in yet

        isBuzzerLocked = state.buzzerState !== 'READY';

        const btn = document.getElementById('btnBuzz');
        const statusText = document.getElementById('buzzerStatusText');
        const pulse = document.getElementById('outerPulse');

        if (state.buzzerState === 'LOCKED') {
          // BUZZERS LOCKED BY OPERATOR
          if (window.buzzerCountdownInterval) clearInterval(window.buzzerCountdownInterval);
          statusText.innerText = "Buzzer Terkunci. Menunggu aba-aba...";
          statusText.className = "text-md text-slate-500 tracking-wide font-semibold";
          btn.className = "no-select w-52 h-52 rounded-full bg-slate-900 border-8 border-slate-800 text-slate-600 font-black text-3xl tracking-widest flex items-center justify-center shadow-inner select-none cursor-not-allowed opacity-30";
          btn.innerHTML = "LOCKED";
          pulse.classList.add('hidden');
        } else if (state.buzzerState === 'COUNTDOWN') {
          // COUNTDOWN PHASE
          if (window.buzzerCountdownInterval) clearInterval(window.buzzerCountdownInterval);
          
          statusText.innerText = "Soal sedang bersiap... Tunggu hitung mundur!";
          statusText.className = "text-md text-indigo-400 font-bold uppercase tracking-wider animate-pulse";
          btn.className = "no-select w-52 h-52 rounded-full bg-slate-950 border-8 border-indigo-900/40 text-indigo-500 font-black text-5xl tracking-widest flex flex-col items-center justify-center shadow-inner select-none cursor-not-allowed opacity-80";
          pulse.classList.add('hidden');

          let timeRemaining = 3;
          btn.innerHTML = `<span class="text-[10px] font-bold tracking-widest uppercase text-indigo-400/60 mb-1">Mulai</span><span class="text-6xl font-black font-cyber text-indigo-400 animate-[ping_1s_infinite]">${timeRemaining}</span>`;
          
          window.buzzerCountdownInterval = setInterval(() => {
            timeRemaining--;
            if (timeRemaining > 0) {
              btn.innerHTML = `<span class="text-[10px] font-bold tracking-widest uppercase text-indigo-400/60 mb-1">Mulai</span><span class="text-6xl font-black font-cyber text-indigo-400 animate-[ping_1s_infinite]">${timeRemaining}</span>`;
            } else {
              clearInterval(window.buzzerCountdownInterval);
              btn.innerHTML = "GO!";
              btn.className = "no-select w-52 h-52 rounded-full bg-gradient-to-b from-indigo-500 to-purple-600 border-8 border-indigo-400 text-white font-black text-5xl tracking-wide flex items-center justify-center shadow-2xl scale-105 transition-all";
            }
          }, 1000);

        } else if (state.buzzerState === 'READY') {
          if (window.buzzerCountdownInterval) {
            clearInterval(window.buzzerCountdownInterval);
            window.buzzerCountdownInterval = null;
          }
          // Safety: If wrongCount is 3, the group that got 3 strikes (activeGroupIndex) is blocked
          if (state.wrongCount === 3 && state.activeGroupIndex !== null && (myGroup - 1) === state.activeGroupIndex) {
            statusText.innerText = "Kelompok Anda Gugur (Buzzer Terkunci)";
            statusText.className = "text-md text-rose-500 tracking-wide font-semibold";
            btn.className = "no-select w-52 h-52 rounded-full bg-slate-900 border-8 border-slate-800 text-slate-600 font-black text-3xl tracking-widest flex items-center justify-center shadow-inner select-none cursor-not-allowed opacity-30";
            btn.innerHTML = "LOCKED";
            pulse.classList.add('hidden');
          } else {
            // BUZZERS READY FOR REBUTAN
            statusText.innerText = "SIAGA! Tekan tombol sekarang!";
            statusText.className = "text-lg text-yellow-400 tracking-wide font-black uppercase animate-pulse";
            btn.className = "no-select w-52 h-52 rounded-full bg-gradient-to-b from-yellow-400 to-amber-500 border-8 border-yellow-300 text-slate-950 font-black text-4xl tracking-widest uppercase flex items-center justify-center shadow-2xl transition-all duration-150 select-none cursor-pointer focus:outline-none neon-btn-glow neon-btn-active";
            btn.innerHTML = "BUZZ!";
            pulse.classList.add('hidden');
          }
        } else if (state.buzzerState === 'BUZZED') {
          // A GROUP BUZZED
          if (state.buzzerGroup === myGroup) {
            // WE WON!
            statusText.innerText = "🚨 ANDA BERHASIL REBUTAN!";
            statusText.className = "text-lg text-emerald-400 font-extrabold tracking-wide uppercase animate-pulse";
            btn.className = "no-select w-52 h-52 rounded-full bg-gradient-to-b from-emerald-400 to-green-600 border-8 border-emerald-300 text-white font-black text-5xl tracking-wide flex flex-col items-center justify-center shadow-2xl transition-all duration-150 select-none cursor-not-allowed shadow-[0_0_40px_rgba(16,185,129,0.6)]";
            pulse.classList.remove('hidden');
            pulse.className = "absolute w-56 h-56 rounded-full bg-emerald-500/10 border border-emerald-500/20 animate-ping";

            // Jalankan countdown local 3 detik di tombol
            if (window.buzzerCountdownInterval) clearInterval(window.buzzerCountdownInterval);
            let timeRemaining = 3;
            btn.innerHTML = `<span class="text-xs font-bold tracking-widest uppercase opacity-75 mb-1">Menjawab</span><span class="text-6xl font-black font-cyber text-yellow-300 animate-pulse">${timeRemaining}</span>`;
            
            window.buzzerCountdownInterval = setInterval(() => {
              timeRemaining--;
              if (timeRemaining > 0) {
                btn.innerHTML = `<span class="text-xs font-bold tracking-widest uppercase opacity-75 mb-1">Menjawab</span><span class="text-6xl font-black font-cyber text-yellow-300 animate-pulse">${timeRemaining}</span>`;
              } else {
                clearInterval(window.buzzerCountdownInterval);
                btn.innerHTML = "LOCKED";
                statusText.innerText = "Waktu menjawab habis!";
                statusText.className = "text-lg text-rose-500 font-extrabold uppercase";
                btn.className = "no-select w-52 h-52 rounded-full bg-slate-800 border-8 border-slate-700 text-slate-500 font-black text-3xl tracking-widest flex items-center justify-center shadow-inner select-none cursor-not-allowed opacity-40";
              }
            }, 1000);
          } else {
            // SOMEONE ELSE WON
            if (window.buzzerCountdownInterval) clearInterval(window.buzzerCountdownInterval);
            statusText.innerText = `Kelompok ${state.buzzerGroup} Menjawab...`;
            statusText.className = "text-lg text-slate-400 tracking-wide font-semibold";
            btn.className = "no-select w-52 h-52 rounded-full bg-slate-800 border-8 border-slate-700 text-slate-500 font-black text-3xl tracking-widest flex items-center justify-center shadow-inner select-none cursor-not-allowed opacity-40";
            btn.innerHTML = "LOCKED";
            pulse.classList.add('hidden');
          }
        }

        // Update poin kelompok sendiri
        updateMyScore(state.scores);
      });
    });

    // Handle Login submission
    function submitLogin(e) {
      e.preventDefault();

      // Initialize AudioContext on user interaction
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        console.warn("AudioContext not supported");
      }

      const groupIndex = document.getElementById('groupSelect').value;
      const pin = document.getElementById('pinInput').value.trim();

      if (!groupIndex) {
        alert("Pilih kelompok terlebih dahulu!");
        return;
      }

      currentPin = pin; // Store temporarily
      socket.emit('verify_pin', { groupIndex, pin });
    }

    // Switch screen to Buzzer
    function showBuzzerScreen() {
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('buzzerPanel').classList.remove('hidden');
      document.getElementById('groupBadge').innerText = `KELOMPOK ${myGroup}`;
    }

    // Update poin kelompok sendiri saja
    function updateMyScore(scores) {
      if (!scores || !myGroup) return;
      const myIndex = myGroup - 1;
      const score = scores[myIndex] || 0;
      const labelEl = document.getElementById('myGroupLabel');
      const scoreEl = document.getElementById('myGroupScore');
      if (labelEl) labelEl.innerText = `Kelompok ${myGroup}`;
      if (scoreEl) scoreEl.innerText = score;
    }

    // Reset back to login
    function resetToLogin() {
      myGroup = null;
      document.getElementById('loginPanel').classList.remove('hidden');
      document.getElementById('buzzerPanel').classList.add('hidden');
      document.getElementById('pinInput').value = '';
    }

    function disconnectBuzzer() {
      // Clear credentials on manual logout
      localStorage.removeItem('family100_buzzer_group');
      localStorage.removeItem('family100_buzzer_pin');
      socket.disconnect();
      socket.connect();
      resetToLogin();
    }

    // Handle Buzzer Tapping (Fast touch start)
    function handleBuzzStart(e) {
      e.preventDefault(); // prevent double triggers (mousedown + touchstart)

      if (isBuzzerLocked || !myGroup) return;

      // Play quick local tick sound
      playLocalTick();

      // Trigger phone vibration for tactile feedback
      if (navigator.vibrate) {
        navigator.vibrate(150);
      }

      // Emit to server
      socket.emit('buzzer_press');
    }

    // Synthesize a quick high tick sound locally for instant feedback
    function playLocalTick() {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } catch (e) {
        console.error("Local sound fail", e);
      }
    }
  </script>
</body>

</html>
